<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Questions - QuizMaster Pro</title>
    <link rel="stylesheet" href="styles/variables.css" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <style>
      .page-header {
        position: sticky;
        top: 0;
        z-index: var(--z-sticky);
        background: var(--color-bg-light);
        border-bottom: 1px solid var(--color-border);
        padding: var(--space-md) var(--space-lg);
      }
      .header-content {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: var(--max-width-sm);
        margin: 0 auto;
      }
      .page-title {
        font-size: var(--font-size-lg);
        font-weight: var(--font-weight-bold);
        margin: 0;
      }
      .question-count {
        font-size: var(--font-size-sm);
        color: var(--color-primary);
        font-weight: var(--font-weight-bold);
      }
      .question-types {
        display: flex;
        gap: var(--space-sm);
        padding: var(--space-md) var(--space-lg);
        overflow-x: auto;
        max-width: var(--max-width-sm);
        margin: 0 auto;
      }
      .type-btn {
        display: flex;
        align-items: center;
        gap: var(--space-xs);
        padding: var(--space-sm) var(--space-md);
        border-radius: var(--radius-full);
        font-size: var(--font-size-sm);
        font-weight: var(--font-weight-medium);
        border: 1px solid var(--color-border);
        background: var(--color-surface-light);
        white-space: nowrap;
        cursor: pointer;
      }
      .type-btn.active {
        background: var(--color-primary);
        color: white;
        border-color: var(--color-primary);
      }
      .main-content {
        max-width: var(--max-width-sm);
        margin: 0 auto;
        padding: var(--space-lg);
        padding-bottom: calc(var(--space-2xl) + 80px);
      }
      .question-card {
        background: var(--color-surface-light);
        border-radius: var(--radius-xl);
        padding: var(--space-lg);
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--color-border);
        margin-bottom: var(--space-lg);
      }
      .question-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--space-md);
      }
      .question-number {
        font-size: var(--font-size-xs);
        font-weight: var(--font-weight-bold);
        color: var(--color-primary);
        text-transform: uppercase;
      }
      .question-actions {
        display: flex;
        gap: var(--space-sm);
      }
      .options-list {
        display: flex;
        flex-direction: column;
        gap: var(--space-md);
      }
      .option-row {
        display: flex;
        align-items: center;
        gap: var(--space-md);
      }
      .option-input-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        gap: var(--space-sm);
        background: var(--color-bg-light);
        padding: var(--space-sm) var(--space-md);
        border-radius: var(--radius-lg);
        border: 1px solid var(--color-border);
      }
      .option-letter {
        font-weight: var(--font-weight-bold);
        color: var(--color-primary);
      }
      .option-input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 0;
      }
      .option-input:focus {
        outline: none;
        box-shadow: none;
      }
      .add-option-btn {
        width: 100%;
        padding: var(--space-md);
        border: 2px dashed var(--color-border);
        border-radius: var(--radius-lg);
        background: transparent;
        color: var(--color-primary);
        font-weight: var(--font-weight-semibold);
        cursor: pointer;
      }
      .add-option-btn:hover {
        border-color: var(--color-primary);
        background: var(--color-primary-light);
      }
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--color-surface-light);
        border-top: 1px solid var(--color-border);
        padding: var(--space-sm) var(--space-lg)
          calc(var(--space-sm) + env(safe-area-inset-bottom));
        z-index: var(--z-sticky);
      }
      .bottom-nav-items {
        display: flex;
        justify-content: space-around;
        max-width: var(--max-width-sm);
        margin: 0 auto;
      }
      .bottom-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: var(--space-xs) var(--space-sm);
        color: var(--color-text-muted);
        text-decoration: none;
        font-size: var(--font-size-xs);
      }
      .bottom-nav-item.active {
        color: var(--color-primary);
      }
      .btn-fab {
        position: fixed;
        bottom: 100px;
        right: var(--space-lg);
        width: 56px;
        height: 56px;
        background: var(--color-primary);
        color: white;
        border-radius: var(--radius-full);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-lg);
        z-index: var(--z-sticky);
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="page-header">
      <div class="header-content">
        <button
          type="button"
          class="btn btn-ghost btn-icon"
          onclick="history.back()"
          aria-label="Go back"
        >
          <span class="material-symbols-outlined">arrow_back_ios_new</span>
        </button>
        <div>
          <h1 class="page-title">Add Questions</h1>
          <span class="question-count">0 questions added</span>
        </div>
        <div style="width: 40px"></div>
      </div>
    </header>

    <div class="question-types">
      <button type="button" class="type-btn active">
        <span class="material-symbols-outlined">checklist</span>
        Multiple Choice
      </button>
      <button type="button" class="type-btn">
        <span class="material-symbols-outlined">flaky</span>
        True/False
      </button>
      <button type="button" class="type-btn">
        <span class="material-symbols-outlined">short_text</span>
        Short Answer
      </button>
      <button type="button" class="type-btn">
        <span class="material-symbols-outlined">article</span>
        Essay
      </button>
    </div>

    <main id="main-content" class="main-content">
      <!-- Questions will be dynamically added here -->
    </main>

    <a href="#" class="btn-fab" aria-label="Add question">
      <span class="material-symbols-outlined">add</span>
    </a>

    <nav class="bottom-nav">
      <div class="bottom-nav-items">
        <a href="dashboard.html" class="bottom-nav-item">
          <span class="material-symbols-outlined">home</span>
          <span>Home</span>
        </a>
        <a href="add-questions.html" class="bottom-nav-item active">
          <span class="material-symbols-outlined">edit_square</span>
          <span>Library</span>
        </a>
        <a href="reports.html" class="bottom-nav-item">
          <span class="material-symbols-outlined">assignment</span>
          <span>Results</span>
        </a>
        <a href="profile.html" class="bottom-nav-item">
          <span class="material-symbols-outlined">person</span>
          <span>Profile</span>
        </a>
      </div>
    </nav>

    <script src="scripts/utils.js"></script>
    <script src="scripts/pages/add-questions.js"></script>
  </body>
</html>
