<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="QuizMaster Pro - Login to access your assessments">
  <title>QuizMaster Pro - Login</title>
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/variables.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages/login.css">
</head>
<body>
  <!-- Skip Link for Accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <main id="main-content" class="login-container">
    <div class="login-card">
      <!-- Header -->
      <header class="login-header">
        <button 
          type="button" 
          class="btn btn-ghost btn-icon back-btn" 
          onclick="history.back()"
          aria-label="Go back"
        >
          <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
        </button>
        <h1 class="login-title">QuizMaster Pro</h1>
      </header>
      
      <!-- Logo / Welcome Area -->
      <div class="login-welcome">
        <div class="login-logo" aria-hidden="true">
          <span class="material-symbols-outlined">school</span>
        </div>
        <h2 class="welcome-title">Welcome Back</h2>
        <p class="welcome-subtitle">Enter your details to access your assessments.</p>
      </div>
      
      <!-- Tab Switcher -->
      <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
        <button 
          type="button"
          class="auth-tab active" 
          role="tab" 
          aria-selected="true" 
          aria-controls="login-panel"
          id="login-tab"
          data-tab="login"
        >
          Login
        </button>
        <button 
          type="button"
          class="auth-tab" 
          role="tab" 
          aria-selected="false" 
          aria-controls="signup-panel"
          id="signup-tab"
          data-tab="signup"
        >
          Sign Up
        </button>
      </div>
      
      <!-- Login Form -->
      <form 
        id="login-form" 
        class="auth-form active" 
        role="tabpanel" 
        aria-labelledby="login-tab"
        novalidate
      >
        <!-- Email Field -->
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <div class="form-input-wrapper">
            <span class="material-symbols-outlined form-input-icon" aria-hidden="true">mail</span>
            <input 
              type="email" 
              id="login-email" 
              name="email"
              class="form-input" 
              placeholder="student@school.edu"
              required
              autocomplete="email"
              aria-required="true"
              aria-describedby="login-email-error"
            >
          </div>
        </div>
        
        <!-- Password Field -->
        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <div class="form-input-wrapper">
            <span class="material-symbols-outlined form-input-icon" aria-hidden="true">lock</span>
            <input 
              type="password" 
              id="login-password" 
              name="password"
              class="form-input" 
              placeholder="••••••••"
              required
              autocomplete="current-password"
              aria-required="true"
              aria-describedby="login-password-error"
            >
            <button 
              type="button" 
              class="btn btn-ghost btn-icon password-toggle"
              onclick="togglePassword('login-password', this)"
              aria-label="Show password"
            >
              <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
            </button>
          </div>
        </div>
        
        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <label class="form-check">
            <input type="checkbox" name="rememberMe" class="form-check-input">
            <span class="form-check-label">Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>
        
        <!-- Login Button -->
        <button type="submit" class="btn btn-primary btn-lg btn-full">
          <span>Login</span>
          <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </button>
      </form>
      
      <!-- Sign Up Form -->
      <form 
        id="signup-form" 
        class="auth-form" 
        role="tabpanel" 
        aria-labelledby="signup-tab"
        hidden
        novalidate
      >
        <!-- Full Name Field -->
        <div class="form-group">
          <label for="signup-fullname" class="form-label">Full Name</label>
          <div class="form-input-wrapper">
            <span class="material-symbols-outlined form-input-icon" aria-hidden="true">person</span>
            <input 
              type="text" 
              id="signup-fullname" 
              name="fullName"
              class="form-input" 
              placeholder="John Doe"
              required
              autocomplete="name"
              aria-required="true"
            >
          </div>
        </div>
        
        <!-- Email Field -->
        <div class="form-group">
          <label for="signup-email" class="form-label">Email Address</label>
          <div class="form-input-wrapper">
            <span class="material-symbols-outlined form-input-icon" aria-hidden="true">mail</span>
            <input 
              type="email" 
              id="signup-email" 
              name="email"
              class="form-input" 
              placeholder="student@school.edu"
              required
              autocomplete="email"
              aria-required="true"
            >
          </div>
        </div>
        
        <!-- Password Field -->
        <div class="form-group">
          <label for="signup-password" class="form-label">Password</label>
          <div class="form-input-wrapper">
            <span class="material-symbols-outlined form-input-icon" aria-hidden="true">lock</span>
            <input 
              type="password" 
              id="signup-password" 
              name="password"
              class="form-input" 
              placeholder="••••••••"
              required
              autocomplete="new-password"
              aria-required="true"
              aria-describedby="password-hint"
            >
            <button 
              type="button" 
              class="btn btn-ghost btn-icon password-toggle"
              onclick="togglePassword('signup-password', this)"
              aria-label="Show password"
            >
              <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
            </button>
          </div>
          <small id="password-hint" class="form-hint">
            Must be at least 8 characters with uppercase, lowercase, and number
          </small>
        </div>
        
        <!-- Role Selection -->
        <div class="form-group">
          <label class="form-label">I am a</label>
          <div class="role-selection">
            <label class="role-option">
              <input type="radio" name="role" value="student" checked>
              <span class="role-card">
                <span class="material-symbols-outlined" aria-hidden="true">school</span>
                <span>Student</span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="teacher">
              <span class="role-card">
                <span class="material-symbols-outlined" aria-hidden="true">person_4</span>
                <span>Teacher</span>
              </span>
            </label>
          </div>
        </div>
        
        <!-- Sign Up Button -->
        <button type="submit" class="btn btn-primary btn-lg btn-full">
          <span>Create Account</span>
          <span class="material-symbols-outlined" aria-hidden="true">arrow_forward</span>
        </button>
      </form>
      
      <!-- Divider -->
      <div class="divider" role="separator">
        <span>Or continue with</span>
      </div>
      
      <!-- Social Buttons -->
      <div class="social-buttons">
        <button type="button" class="btn btn-secondary btn-full social-btn" disabled>
          <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
        <button type="button" class="btn btn-secondary btn-full social-btn" disabled>
          <svg class="social-icon" viewBox="0 0 21 21" aria-hidden="true">
            <path fill="#f25022" d="M1 1h9v9H1z"/>
            <path fill="#00a4ef" d="M1 11h9v9H1z"/>
            <path fill="#7fba00" d="M11 1h9v9h-9z"/>
            <path fill="#ffb900" d="M11 11h9v9h-9z"/>
          </svg>
          Microsoft
        </button>
      </div>
      
      <!-- Sign Up Prompt (shown in login mode) -->
      <p class="auth-switch" id="login-switch">
        Don't have an account? 
        <button type="button" class="link-button" onclick="switchTab('signup')">Create Account</button>
      </p>
      
      <!-- Login Prompt (shown in signup mode) -->
      <p class="auth-switch hidden" id="signup-switch">
        Already have an account? 
        <button type="button" class="link-button" onclick="switchTab('login')">Login</button>
      </p>
    </div>
  </main>
  
  <!-- Scripts -->
  <script src="scripts/utils.js"></script>
  <script src="scripts/pages/login.js"></script>
</body>
</html>
